version: "3.9"

services:

  backend:
    build: ./backend
    container_name: portfolio-backend
    ports:
      - "8000:8000"
    depends_on:
      - mongo
    environment:
      - MONGODB_URI=mongodb://mongo:27017
      - MONGODB_DB=project_portfolio
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./backend/data:/app/data

  frontend:
    build: ./frontend
    container_name: portfolio-frontend
    ports:
      - "8080:8080"
    depends_on:
      - backend

  mongo:
    image: mongo:7
    container_name: portfolio-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: